name: Daily Fallback Check

# 兜底:如果 GitHub Actions 的 schedule 漏掉了当天的 8:00 / 8:20 触发,
# 9:30 北京时间这个 workflow 自动补救。
#
# 策略:
#   1. 拉 main 分支(workflow / scripts 在 main 上)
#   2. 通过 git show 读 master 上的 docs/_posts/<今日>-horizon-zh.md
#   3. 不存在 → 自动触发 daily-summary 补救
#   4. 推一条 hiboard 通知,告诉你今天的状态

on:
  schedule:
    - cron: '30 1 * * *'  # Daily at 09:30 Asia/Shanghai (= UTC 01:30)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to check (YYYY-MM-DD). Default: today Beijing.'
        required: false

jobs:
  fallback:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  # needed to dispatch another workflow via GITHUB_TOKEN

    steps:
      - name: Checkout main (this workflow's scripts live here)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine Beijing date and check if master has today's post
        id: check
        env:
          DATE_INPUT: ${{ inputs.date }}
        run: |
          if [ -n "$DATE_INPUT" ]; then
            DATE="$DATE_INPUT"
          else
            DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          fi
          POST_PATH="docs/_posts/${DATE}-horizon-zh.md"
          echo "date=$DATE"
          echo "post_path=$POST_PATH"
          # Try to fetch the post from origin/master into a temp file
          if git show "origin/master:${POST_PATH}" > "/tmp/daily-post.md" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            STORIES=$(grep -c '^## ' "/tmp/daily-post.md" 2>/dev/null || echo "0")
            echo "stories=$STORIES" >> "$GITHUB_OUTPUT"
            echo "OK: today's daily post exists on master ($STORIES stories)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "stories=0" >> "$GITHUB_OUTPUT"
            echo "MISSING: today's daily post not on master"
            echo "Recent commits on master:"
            git log --oneline origin/master -5 | sed 's/^/  /'
          fi

      - name: Trigger daily-summary as a rescue run if post is missing
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering rescue run of daily-summary..."
          HTTP_STATUS=$(curl -sS -o /tmp/dispatch-resp.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-summary.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "Dispatch HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::error::Failed to trigger daily-summary: $HTTP_STATUS"
            cat /tmp/dispatch-resp.json
            exit 1
          fi

      - name: Wait for rescue run to deploy to master
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          echo "Waiting for rescue daily-summary run to complete..."
          for i in {1..30}; do
            sleep 10
            RUN_INFO=$(curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/actions/workflows/daily-summary.yml/runs?per_page=1")
            RUN_STATUS=$(echo "$RUN_INFO" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d['workflow_runs'][0]; print(f\"{r['status']}|{r.get('conclusion','')}\")")
            echo "[$i/30] latest daily-summary run: $RUN_STATUS"
            if [[ "$RUN_STATUS" == completed* ]]; then
              echo "Rescue run completed: $RUN_STATUS"
              break
            fi
          done

      - name: Re-fetch post from master after rescue
        if: steps.check.outputs.exists == 'false'
        id: refetch
        env:
          DATE_INPUT: ${{ inputs.date }}
        run: |
          if [ -n "$DATE_INPUT" ]; then
            DATE="$DATE_INPUT"
          else
            DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          fi
          POST_PATH="docs/_posts/${DATE}-horizon-zh.md"
          if git show "origin/master:${POST_PATH}" > "/tmp/daily-post.md" 2>/dev/null; then
            echo "refetched=true" >> "$GITHUB_OUTPUT"
          else
            echo "refetched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build hiboard payload via external script
        id: payload
        env:
          DATE_INPUT: ${{ inputs.date }}
          PAGES_BASE: 'https://pengyinyu2009-oss.github.io/Horizon'
        run: |
          if [ -n "$DATE_INPUT" ]; then
            DATE="$DATE_INPUT"
          else
            DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          fi
          POST_PATH="docs/_posts/${DATE}-horizon-zh.md"
          set -o pipefail
          STATUS=$(python3 .github/scripts/build_fallback_payload.py "/tmp/daily-post.md")
          echo "build_fallback_payload.py -> $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Final payload:"
          cat /tmp/horizon-fallback-payload.json

      - name: Push fallback notification to hiboard
        env:
          HIBOARD_AUTH_CODE: ${{ vars.HIBOARD_AUTH_CODE || secrets.HIBOARD_AUTH_CODE || '9z9H6Vjb9C0N' }}
          HIBOARD_URL: 'https://hiboard-claw-drcn.ai.dbankcloud.cn/distribution/message/cloud/claw/msg/upload'
        run: |
          if [ -z "$HIBOARD_AUTH_CODE" ]; then
            echo "::error::HIBOARD_AUTH_CODE not set"
            exit 1
          fi
          PAYLOAD=$(cat /tmp/horizon-fallback-payload.json)
          TRACE_ID="horizon-fallback-$(date +'%Y%m%d%H%M%S')"
          HTTP_STATUS=$(curl -sS -o /tmp/hiboard-resp.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "User-Agent: OpenClaw-TaskPusher/2.0" \
            -H "x-trace-id: ${TRACE_ID}" \
            --data-binary "$PAYLOAD" \
            "$HIBOARD_URL")
          echo "Hiboard HTTP $HTTP_STATUS:"
          cat /tmp/hiboard-resp.json
          echo ""
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::hiboard returned HTTP $HTTP_STATUS"
            exit 1
          fi
          CODE=$(python3 -c "import json; d=json.load(open('/tmp/hiboard-resp.json')); print(d.get('code') or d.get('data',{}).get('code',''))")
          if [ "$CODE" != "0000000000" ] && [ "$CODE" != "0" ] && [ "$CODE" != "200" ] && [ -n "$CODE" ]; then
            echo "::error::hiboard business error code=$CODE"
            exit 1
          fi
          echo "Fallback notification pushed (status=${{ steps.payload.outputs.status }})"
