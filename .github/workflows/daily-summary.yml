name: Daily Horizon Summary

# Reliability note: GitHub Actions' built-in `on: schedule` is unreliable.
# Empirically a single `0 0 * * *` cron can fire 18h late, twice in one
# day, or be skipped entirely. The fix is to fire every 5 minutes and use
# a time-window + state-dedup gate at the start of the job:
#   - Outside the 00:00–01:00 UTC window (= 08:00–09:00 Beijing) the job
#     exits immediately. GHA still wakes the runner but the run is a few
#     seconds of bash, well within free-plan minutes (~150 min/month).
#     Window widened from 20 to 60 minutes on 2026-06-27 because the
#     narrower 7:50–8:10 BJT window was repeatedly skipped entirely by
#     GHA's */5 scheduler in the Asia time-zone. 60 minutes = 12 */5
#     triggers, statistically near-impossible to miss, and the state-
#     dedup still keeps it down to a single run/day.
#   - Inside the window, if today's `docs/_posts/YYYY-MM-DD-horizon-zh.md`
#     already exists on master, the job exits. This handles the case
#     where multiple */5 triggers in the window all wake up before any
#     single run finishes deploying.
# The first run that survives both checks is the one that actually
# generates the post.
#
# Local mavis-cron backstop (~/.mavis/cron/today-task-daily-summary-backstop)
# fires workflow_dispatch at 08:30 BJT if today's post is missing — final
# backstop if GHA misses the whole window.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes. Window + state dedup inside
                            # the job filters down to a single 8:00 BJT
                            # run per day (plus the silent 23h55m).
    - cron: '0 10 * * 1'   # Weekly: every Monday 10:00 Asia/Shanghai.
                            #   10:00 BJT = 02:00 UTC. Picked to land AFTER
                            #   the daily run finishes (08:00–09:00 window)
                            #   so the prereq check finds all 7 daily posts
                            #   from the previous Mon..Sun already on master.
      timezone: 'Asia/Shanghai'
    - cron: '0 10 8 * *'   # Monthly: 8th of each month 10:00 Asia/Shanghai.
                            #   Why the 8th (not the 1st): if the previous
                            #   month's last ISO week spills into the new
                            #   month (e.g. 2026-06 ends on Tue 06-30, which
                            #   belongs to ISO week 2026-W27 starting Mon
                            #   06-29), the monthly prereq needs that final
                            #   weekly, and the weekly cron only fires on
                            #   Monday. So we wait a full week into the new
                            #   month to be safe.
      timezone: 'Asia/Shanghai'
    - cron: '0 10 15 7 *'  # Yearly H1: 15 July 10:00 Asia/Shanghai.
                            #   Why the 15th (not 1 July): the H1 prereq
                            #   includes the June monthly, which now fires
                            #   on 8 July. +1 week buffer so H1 doesn't
                            #   race the June monthly on the same morning.
      timezone: 'Asia/Shanghai'
    - cron: '0 10 15 1 *'  # Yearly H2: 15 January 10:00 Asia/Shanghai.
                            #   Same buffer: H2 needs Dec monthly, which
                            #   fires on 8 January.
      timezone: 'Asia/Shanghai'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass state dedup and regenerate today even if the post already exists on master.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    # Serialize per-day so two */5 triggers in the same window can't both
    # run LLM generation + push the same post.
    concurrency:
      group: daily-summary-${{ inputs.date || github.event.head_commit.timestamp || 'live' }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      # Checkout must come BEFORE the gate, because the gate uses
      # `git show origin/master:docs/...` which needs a git repo. Doing
      # the gate first means "fatal: not a git repository" — that's
      # exactly what bit run #49 on 2026-06-22.
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Window + state dedup (gate via output, NOT exit 0)
        id: gate
        run: |
          # Cron */5 fires 288x/day. Filter down to the 8:00–9:00 Beijing
          # window (00:00–01:00 UTC). Inside the window, skip if today's
          # post is already on master — that means a previous */5 trigger
          # in the same window already finished.
          #
          # CRITICAL: do NOT use `exit 0` to "skip" — exit 0 only exits
          # the current step, the rest of the job keeps running. Use
          # $GITHUB_OUTPUT `should_run` + `if: steps.gate.outputs.should_run == 'true'`
          # on every later step instead.
          BJT_NOW=$(TZ=Asia/Shanghai date +'%H%M')
          echo "BJT_NOW=$BJT_NOW (window: 0800–1100), trigger=${{ github.event_name }}"
          # Manual triggers (workflow_dispatch) bypass the time window —
          # operator wants to run NOW, even outside 9:00 BJT.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — bypassing time-window gate."
          else
            if [ "$BJT_NOW" -lt "0800" ] || [ "$BJT_NOW" -gt "1100" ]; then
              echo "Outside 08:00–09:00 Beijing window, skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          POST="docs/_posts/${DATE}-horizon-zh.md"
          echo "DATE=$DATE POST=$POST"
          git fetch origin master --depth=1
          if git show "origin/master:${POST}" > /dev/null 2>&1; then
            if [ "${{ inputs.force }}" = "true" ]; then
              echo "force=true — today's post exists on master, but regenerating anyway (operator override)."
            else
              echo "Today's post already on master, skipping."
              git show "origin/master:${POST}" | head -3
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "In window and no existing post — proceeding with daily run."

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.gate.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: uv sync

      - name: Prepare GitHub Actions config
        if: steps.gate.outputs.should_run == 'true'
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        if: steps.gate.outputs.should_run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Run Horizon (EE edition)
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cp data/config.ee.json data/config.json
          DATE=$(date -u +'%Y-%m-%d')
          cp "data/summaries/${DATE}-horizon-zh.md" "/tmp/${DATE}-horizon-zh.md.bak" || true
          uv run horizon --hours 24
          mv "data/summaries/${DATE}-horizon-zh.md" "data/summaries/${DATE}-ee-zh.md"

      - name: Run Horizon (embedded edition)
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cp data/config.embedded.json data/config.json
          uv run horizon --hours 24
          DATE=$(date -u +'%Y-%m-%d')
          mv "data/summaries/${DATE}-horizon-zh.md" "data/summaries/${DATE}-embedded-zh.md"

      - name: Run Horizon (OSHW edition)
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cp data/config.oshw.json data/config.json
          uv run horizon --hours 24
          DATE=$(date -u +'%Y-%m-%d')
          mv "data/summaries/${DATE}-horizon-zh.md" "data/summaries/${DATE}-oshw-zh.md"
          cp "/tmp/${DATE}-horizon-zh.md.bak" "data/summaries/${DATE}-horizon-zh.md" || true

      - name: Append OSHW observations
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          uv run python scripts/append_observations.py --date $(date -u +'%Y-%m-%d')

      - name: Append EE/Embedded daily knowledge card
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          uv run python scripts/append_knowledge.py --edition ee --date "$DATE"
          uv run python scripts/append_knowledge.py --edition embedded --date "$DATE"

      - name: Deploy docs to master for Pages
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          # Refresh static site assets (config, css, includes) from main
          # but DO NOT rm -rf docs/ — that wipes out historical
          # _posts/ files accumulated by previous daily runs.
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          # Bring forward any _posts that already exist on master (from
          # earlier runs) and overlay today's freshly-written summary
          # on top. ``cp -n`` would skip writes — we want to overwrite
          # today's file, so use plain cp.
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "📝 Daily Summary: $DATE"
            git push origin master
          fi

  weekly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Fetch prior reports from master → data/summaries/
        run: |
          # Chain-mode rollups (weekly/monthly/yearly) read prior reports from
          # data/summaries/, but that dir is .gitignored and empty on a fresh
          # GHA runner. Materialise master docs/_posts/ into data/summaries/
          # so list_recent_summaries() has input.
          #
          # Files land with the same -horizon-zh.md suffix the storage layer
          # already keys on, so prior daily/weekly/monthly reports all
          # flow through the same filename matcher.
          git fetch origin master --depth=1
          mkdir -p data/summaries
          for f in $(git ls-tree -r --name-only origin/master docs/_posts/); do
            base=$(basename "$f")
            git show "origin/master:$f" > "data/summaries/$base"
          done
          echo "Loaded $(ls data/summaries/ | wc -l) prior report(s) from master:"
          ls data/summaries/ | tail -10
      - name: Run weekly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon weekly
      - name: Deploy weekly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📅 Weekly Summary"
            git push origin master
          fi

  monthly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Fetch prior reports from master → data/summaries/
        run: |
          # See weekly-summary job above for the full rationale. Chain-mode
          # rollups read from data/summaries/ which is .gitignored; we
          # materialise master docs/_posts/ into it on every rollup job.
          git fetch origin master --depth=1
          mkdir -p data/summaries
          for f in $(git ls-tree -r --name-only origin/master docs/_posts/); do
            base=$(basename "$f")
            git show "origin/master:$f" > "data/summaries/$base"
          done
          echo "Loaded $(ls data/summaries/ | wc -l) prior report(s) from master"
      - name: Run monthly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon monthly
      - name: Deploy monthly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📆 Monthly Summary"
            git push origin master
          fi

  yearly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Fetch prior reports from master → data/summaries/
        run: |
          # See weekly-summary job above for the full rationale. Chain-mode
          # rollups read from data/summaries/ which is .gitignored; we
          # materialise master docs/_posts/ into it on every rollup job.
          git fetch origin master --depth=1
          mkdir -p data/summaries
          for f in $(git ls-tree -r --name-only origin/master docs/_posts/); do
            base=$(basename "$f")
            git show "origin/master:$f" > "data/summaries/$base"
          done
          echo "Loaded $(ls data/summaries/ | wc -l) prior report(s) from master"
      - name: Run yearly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon yearly
      - name: Deploy yearly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗓 Yearly Summary"
            git push origin master
          fi
