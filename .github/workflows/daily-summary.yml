name: Daily Horizon Summary

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
    - cron: '0 0 * * 1'  # Weekly: every Monday 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
    - cron: '0 0 1 * *'  # Monthly: 1st of each month 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
    - cron: '0 0 31 12 *'  # Yearly: Dec 31 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Deploy docs to master for Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          # Refresh static site assets (config, css, includes) from main
          # but DO NOT rm -rf docs/ — that wipes out historical
          # _posts/ files accumulated by previous daily runs.
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          # Bring forward any _posts that already exist on master (from
          # earlier runs) and overlay today's freshly-written summary
          # on top. ``cp -n`` would skip writes — we want to overwrite
          # today's file, so use plain cp.
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "📝 Daily Summary: $DATE"
            git push origin master
          fi

  weekly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Run weekly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon weekly
      - name: Deploy weekly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📅 Weekly Summary"
            git push origin master
          fi

  monthly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Run monthly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon monthly
      - name: Deploy monthly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📆 Monthly Summary"
            git push origin master
          fi

  yearly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Run yearly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon yearly
      - name: Deploy yearly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗓 Yearly Summary"
            git push origin master
          fi
