name: Daily Horizon Summary

# Reliability note: GitHub Actions' built-in `on: schedule` is unreliable.
# Empirically a single `0 0 * * *` cron can fire 18h late, twice in one
# day, or be skipped entirely. The fix is to fire every 5 minutes and use
# a time-window + state-dedup gate at the start of the job:
#   - Outside the 23:50–00:10 UTC window (= 07:50–08:10 Beijing) the job
#     exits immediately. GHA still wakes the runner but the run is a few
#     seconds of bash, well within free-plan minutes (~150 min/month).
#   - Inside the window, if today's `docs/_posts/YYYY-MM-DD-horizon-zh.md`
#     already exists on master, the job exits. This handles the case
#     where multiple */5 triggers in the window all wake up before any
#     single run finishes deploying.
# The first run that survives both checks is the one that actually
# generates the post. External cron services (cron-job.org, etc.) and
# the separate daily-fallback workflow are no longer needed.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes. Window + state dedup inside
                            # the job filters down to a single 8:00 BJT
                            # run per day (plus the silent 23h55m).
    - cron: '0 0 * * 1'    # Weekly: every Monday 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
    - cron: '0 0 1 * *'    # Monthly: 1st of each month 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
    - cron: '0 0 31 12 *'  # Yearly: Dec 31 00:00 Asia/Shanghai
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    # Serialize per-day so two */5 triggers in the same window can't both
    # run LLM generation + push the same post.
    concurrency:
      group: daily-summary-${{ inputs.date || github.event.head_commit.timestamp || 'live' }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      # Checkout must come BEFORE the gate, because the gate uses
      # `git show origin/master:docs/...` which needs a git repo. Doing
      # the gate first means "fatal: not a git repository" — that's
      # exactly what bit run #49 on 2026-06-22.
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Window + state dedup (gate via output, NOT exit 0)
        id: gate
        run: |
          # Cron */5 fires 288x/day. Filter down to the 7:50–8:10 Beijing
          # window (23:50–00:10 UTC). Inside the window, skip if today's
          # post is already on master — that means a previous */5 trigger
          # in the same window already finished.
          #
          # CRITICAL: do NOT use `exit 0` to "skip" — exit 0 only exits
          # the current step, the rest of the job keeps running. Use
          # $GITHUB_OUTPUT `should_run` + `if: steps.gate.outputs.should_run == 'true'`
          # on every later step instead.
          BJT_NOW=$(TZ=Asia/Shanghai date +'%H%M')
          echo "BJT_NOW=$BJT_NOW (window: 0750–0810), trigger=${{ github.event_name }}"
          # Manual triggers (workflow_dispatch) bypass the time window —
          # operator wants to run NOW, even outside 8:00 BJT.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — bypassing time-window gate."
          else
            if [ "$BJT_NOW" -lt "0750" ] || [ "$BJT_NOW" -gt "0810" ]; then
              echo "Outside 07:50–08:10 Beijing window, skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          POST="docs/_posts/${DATE}-horizon-zh.md"
          echo "DATE=$DATE POST=$POST"
          git fetch origin master --depth=1
          if git show "origin/master:${POST}" > /dev/null 2>&1; then
            echo "Today's post already on master, skipping."
            git show "origin/master:${POST}" | head -3
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "In window and no existing post — proceeding with daily run."

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.gate.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: uv sync

      - name: Prepare GitHub Actions config
        if: steps.gate.outputs.should_run == 'true'
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        if: steps.gate.outputs.should_run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Deploy docs to master for Pages
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          # Refresh static site assets (config, css, includes) from main
          # but DO NOT rm -rf docs/ — that wipes out historical
          # _posts/ files accumulated by previous daily runs.
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          # Bring forward any _posts that already exist on master (from
          # earlier runs) and overlay today's freshly-written summary
          # on top. ``cp -n`` would skip writes — we want to overwrite
          # today's file, so use plain cp.
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "📝 Daily Summary: $DATE"
            git push origin master
          fi

  weekly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Run weekly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon weekly
      - name: Deploy weekly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📅 Weekly Summary"
            git push origin master
          fi

  monthly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Run monthly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon monthly
      - name: Deploy monthly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📆 Monthly Summary"
            git push origin master
          fi

  yearly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Run yearly roll-up
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon yearly
      - name: Deploy yearly to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: force discard local changes when switching branches
          # (otherwise git refuses if main and master both have today's
          # same-dated _posts file).
          git checkout -f master
          git pull origin master || true
          git checkout -f main -- docs/_config.yml docs/_includes docs/assets .github/scripts 2>/dev/null || true
          mkdir -p docs/_posts
          git checkout -f master -- docs/_posts 2>/dev/null || true
          cp data/summaries/*.md docs/_posts/ || true
          git add -f docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗓 Yearly Summary"
            git push origin master
          fi
