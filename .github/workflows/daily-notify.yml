name: Daily Notify (Hiboard)

# Runs ~10 minutes after daily-summary. Reads the just-deployed
# daily post from master, extracts the 8+ story headlines, and
# pushes a notification to hiboard (华为负一屏).
#
# Dedup: before pushing, the workflow checks state/hiboard-pushed/${date}.json
# on master. If a previous run already pushed today's digest, this run
# is a no-op. State is committed back to master on successful push.
#
# Reliability: this workflow fires every 5 minutes. A time-window
# filter (08:10–08:30 Beijing) inside the job gates down to a single
# intended run per day, and the hiboard state-file dedup catches the
# case where two triggers in the window both wake up before any
# single run finishes pushing. No external cron service needed.

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes. Window + state dedup inside
                            # the job filters down to a single 8:15 BJT
                            # run per day (plus the silent 23h55m).
  workflow_dispatch:
    inputs:
      date:
        description: 'Override the date to notify for (YYYY-MM-DD). Default: today.'
        required: false
      force:
        description: 'Bypass dedup and push even if today was already pushed.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  notify:
    runs-on: ubuntu-latest
    # Serialize per-day so two */5 triggers in the same window can't both
    # race past the state-file check before either has pushed it.
    concurrency:
      group: daily-notify-${{ inputs.date || 'today' }}
      cancel-in-progress: false
    permissions:
      contents: write  # needed to commit state/hiboard-pushed/${date}.json

    steps:
      - name: Window filter (gate via output, NOT exit 0)
        id: gate
        run: |
          # Cron */5 fires 288x/day. Filter down to the 8:10–8:30 Beijing
          # window (00:10–00:30 UTC) so we only attempt to push during the
          # intended time slot. The state-file dedup below is the
          # authoritative guard against duplicate pushes.
          #
          # CRITICAL: do NOT use `exit 0` to "skip" — exit 0 only exits
          # the current step, the rest of the job keeps running. Use
          # $GITHUB_OUTPUT `should_run` + `if: steps.gate.outputs.should_run == 'true'`
          # on every later step instead.
          BJT_NOW=$(TZ=Asia/Shanghai date +'%H%M')
          echo "BJT_NOW=$BJT_NOW (window: 0810–0830)"
          if [ "$BJT_NOW" -lt "0810" ] || [ "$BJT_NOW" -gt "0830" ]; then
            echo "Outside 08:10–08:30 Beijing window, skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Checkout master for the just-deployed post + state file
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Check if today's digest was already pushed
        if: steps.gate.outputs.should_run == 'true'
        id: dedup
        env:
          DATE_INPUT: ${{ inputs.date }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ -n "$DATE_INPUT" ]; then
            DATE="$DATE_INPUT"
          else
            DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          fi
          STATE_PATH="state/hiboard-pushed/${DATE}.json"
          echo "date=$DATE"
          echo "state_path=$STATE_PATH"
          if [ "$FORCE" = "true" ]; then
            echo "already_pushed=false" >> "$GITHUB_OUTPUT"
            echo "force=true: bypassing dedup"
          elif [ -f "$STATE_PATH" ]; then
            echo "already_pushed=true" >> "$GITHUB_OUTPUT"
            echo "STATE FOUND — today's digest was already pushed at:"
            cat "$STATE_PATH"
            echo ""
            echo "Skipping push. Re-run with force=true to override."
          else
            echo "already_pushed=false" >> "$GITHUB_OUTPUT"
            echo "No state file — proceeding with push."
          fi

      - name: Push to hiboard (华为负一屏)
        if: steps.gate.outputs.should_run == 'true' && steps.dedup.outputs.already_pushed != 'true'
        env:
          DATE_INPUT: ${{ inputs.date }}
          HIBOARD_AUTH_CODE: ${{ vars.HIBOARD_AUTH_CODE || secrets.HIBOARD_AUTH_CODE || '9z9H6Vjb9C0N' }}
          HIBOARD_URL: 'https://hiboard-claw-drcn.ai.dbankcloud.cn/distribution/message/cloud/claw/msg/upload'
          PAGES_BASE: 'https://pengyinyu2009-oss.github.io/Horizon'
        run: |
          set -eu

          if [ -n "$DATE_INPUT" ]; then
            DATE="$DATE_INPUT"
          else
            DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          fi
          POST="docs/_posts/${DATE}-horizon-zh.md"
          echo "Looking for: $POST"
          if [ ! -f "$POST" ]; then
            echo "::error::No daily post at $POST — daily run must have failed or hasn't deployed yet."
            echo "::error::Available posts in docs/_posts/:"
            ls -la docs/_posts/ 2>&1 | head -20
            exit 1
          fi

          if [ -z "$HIBOARD_AUTH_CODE" ]; then
            echo "::error::HIBOARD_AUTH_CODE secret is not set."
            exit 1
          fi

          # Build the payload via the external script so YAML / shell heredoc /
          # Python indentation are all decoupled. (Earlier inline-heredoc versions
          # of this step kept breaking under YAML 1.2 / Python Module-scope
          # indentation rules — see git history of daily-notify.yml.)
          python3 .github/scripts/build_hiboard_payload.py "$POST" > /tmp/horizon-payload.json

          PAYLOAD=$(cat /tmp/horizon-payload.json)
          TRACE_ID="horizon-daily-$(date +'%Y%m%d%H%M%S')"
          echo "POSTing ${#PAYLOAD} bytes to ${HIBOARD_URL} (x-trace-id: ${TRACE_ID})"
          HTTP_STATUS=$(curl -sS -o /tmp/hiboard-resp.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "User-Agent: OpenClaw-TaskPusher/2.0" \
            -H "x-trace-id: ${TRACE_ID}" \
            --data-binary "$PAYLOAD" \
            "$HIBOARD_URL")

          echo "Hiboard response (HTTP $HTTP_STATUS):"
          cat /tmp/hiboard-resp.json
          echo ""

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::hiboard returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # Business success code is "0000000000" (string). Anything else is
          # a failure and we surface it.
          CODE=$(python3 -c "import json; d=json.load(open('/tmp/hiboard-resp.json')); print(d.get('code') or d.get('data',{}).get('code',''))")
          if [ "$CODE" != "0000000000" ] && [ "$CODE" != "0" ] && [ "$CODE" != "200" ] && [ -n "$CODE" ]; then
            echo "::error::hiboard business error code=$CODE"
            cat /tmp/hiboard-resp.json
            exit 1
          fi

          # Persist the success state so any re-run of this cron (or any
          # other path that POSTs the same digest) is a no-op. Capture the
          # summary from the payload we just sent so a quick `cat` of the
          # state file tells you what the user saw.
          mkdir -p "state/hiboard-pushed"
          python3 - <<PY
          import json
          with open('/tmp/horizon-payload.json') as f:
              payload = json.load(f)
          item = payload['data']['msgContent'][0]
          with open('state/hiboard-pushed/${DATE}.json', 'w') as f:
              json.dump({
                  'date': '${DATE}',
                  'msgId': item['msgId'],
                  'summary': item['summary'],
                  'traceId': '${TRACE_ID}',
                  'pushedAt': '$(date -u +'%Y-%m-%dT%H:%M:%SZ')',
              }, f, ensure_ascii=False, indent=2)
          print('Wrote state/hiboard-pushed/${DATE}.json')
          PY
          cat "state/hiboard-pushed/${DATE}.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "state/hiboard-pushed/${DATE}.json"
          if git diff --cached --quiet; then
            echo "No state change to commit"
          else
            git commit -m "hiboard: record daily-notify push for ${DATE}"
            git push origin master
            echo "State file committed and pushed to master"
          fi

          echo "Notification pushed (code=$CODE, traceId=$TRACE_ID)"
