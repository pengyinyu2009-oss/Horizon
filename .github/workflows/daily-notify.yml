name: Daily Notify (Hiboard)

# Runs ~10 minutes after daily-summary. Reads the just-deployed
# daily post from master, extracts the 8+ story headlines, and
# pushes a notification to hiboard (华为负一屏) via the same
# payload shape that today-task's TaskPusher().push() uses.
on:
  schedule:
    - cron: '10 0 * * *'  # 08:10 Asia/Shanghai every day
      timezone: 'Asia/Shanghai'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override the date to notify for (YYYY-MM-DD). Default: today.'
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master for the just-deployed post
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Push to hiboard (华为负一屏)
        env:
          DATE_INPUT: ${{ inputs.date }}
          HIBOARD_AUTH_CODE: ${{ vars.HIBOARD_AUTH_CODE || secrets.HIBOARD_AUTH_CODE || '9z9H6Vjb9C0N' }}
          HIBOARD_URL: 'https://hiboard-claw-drcn.ai.dbankcloud.cn/distribution/message/cloud/claw/msg/upload'
          PAGES_BASE: 'https://pengyinyu2009-oss.github.io/Horizon'
        run: |
          set -eu

          DATE="${DATE_INPUT:-$(date +'%Y-%m-%d')}"
          POST="docs/_posts/${DATE}-horizon-zh.md"
          echo "Looking for: $POST"
          if [ ! -f "$POST" ]; then
            echo "::error::No daily post at $POST — daily run must have failed or hasn't deployed yet."
            echo "::error::Available posts in docs/_posts/:"
            ls -la docs/_posts/ 2>&1 | head -20
            exit 1
          fi

          if [ -z "$HIBOARD_AUTH_CODE" ]; then
            echo "::error::HIBOARD_AUTH_CODE secret is not set."
            echo "::error::Get the code from your phone: 负一屏 → 我的 → 动态管理 → 关联账号 → Claw智能体."
            echo "::error::Then add it under repo Settings → Secrets → Actions as HIBOARD_AUTH_CODE."
            exit 1
          fi

          # 1. Parse 8+ headlines from the daily post.
          python3 - "$POST" > /tmp/horizon-payload.json <<'PY'
          import os, re, sys, json
          from datetime import datetime

          path = sys.argv[1]
          date_input = os.environ.get("DATE_INPUT", "").strip()
          date = date_input or datetime.now().strftime("%Y-%m-%d")
          pages_base = os.environ.get("PAGES_BASE", "https://pengyinyu2009-oss.github.io/Horizon")
          post_url = f"{pages_base}/{date[0:4]}/{date[5:7]}/{date[8:10]}/horizon-zh.html"
          home_url = f"{pages_base}/"

          text = open(path, encoding="utf-8").read()
          if text.startswith("---\n"):
              end = text.find("\n---\n", 4)
              if end != -1:
                  text = text[end + 5:]

          # Headlines with score in 8+; keep the top 12.
          headlines = re.findall(
              r'^##\s+\[([^\]]+)\]\(([^)]+)\)\s*\u2b50\ufe0f\s*([\d.]+)/10',
              text, re.MULTILINE,
          )
          seen, top = set(), []
          for title, url, score in headlines:
              try:
                  s = float(score)
              except ValueError:
                  continue
              if s < 8.0:
                  continue
              if url in seen:
                  continue
              seen.add(url)
              top.append((s, title.strip(), url.strip()))
          top.sort(reverse=True)
          top = top[:12]

          # hiboard expects a markdown body in the `content` field.
          # Mirror the same shape the today-task skill uses for the
          # mavis→hiboard end-to-end path so notifications look
          # identical regardless of which side initiated them.
          lines = [
              f"## 🌅 Horizon 每日速递 · {date}",
              "",
              f"**{len(top)} 条 8 分以上要事**",
              "",
          ]
          for s, t, u in top:
              lines.append(f"- ⭐ **{s:.1f}** [{t}]({u})")
          lines += [
              "",
              "---",
              "",
              f"📖 [完整简报]({post_url})",
              "",
              f"🏠 [首页]({home_url})",
          ]
          content = "\n".join(lines)

          summary = f"🌅 Horizon 每日速递 {date} · {len(top)} 条 8+"
          result = f"daily-summary {date} 已生成"

          # hiboard payload: outer {"data": {...}}, msgContent list
           msg_id = f"horizon-daily-{date}"
           payload = {
               "source": "horizon",
               "data": {
                   "authCode": os.environ["HIBOARD_AUTH_CODE"],
                   "msgContent": [
                       {
                           "msgId": msg_id,
                           "scheduleTaskId": "horizon-daily",
                           "summary": summary,
                           "result": result,
                           "content": content,
                       }
                   ],
               }
           }
           json.dump(payload, sys.stdout, ensure_ascii=False)
          PY

          # 2. Send to hiboard
          PAYLOAD=$(cat /tmp/horizon-payload.json)
          TRACE_ID="horizon-daily-$(date +'%Y%m%d%H%M%S')"
          echo "POSTing ${#PAYLOAD} bytes to ${HIBOARD_URL} (x-trace-id: ${TRACE_ID})"
          HTTP_STATUS=$(curl -sS -o /tmp/hiboard-resp.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "User-Agent: OpenClaw-TaskPusher/2.0" \
            -H "x-trace-id: ${TRACE_ID}" \
            --data-binary "$PAYLOAD" \
            "$HIBOARD_URL")

          echo "Hiboard response (HTTP $HTTP_STATUS):"
          cat /tmp/hiboard-resp.json
          echo ""

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::hiboard returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # The hiboard business status lives under .code (string
          # "0000000000" = success). Treat any other value as a
          # hard failure so the workflow surfaces it.
          if command -v jq >/dev/null 2>&1; then
            CODE=$(jq -r '.code // .data.code // ""' /tmp/hiboard-resp.json)
          else
            CODE=$(python3 -c "import json; d=json.load(open('/tmp/hiboard-resp.json')); print(d.get('code') or d.get('data',{}).get('code',''))")
          fi
          if [ "$CODE" != "0000000000" ] && [ "$CODE" != "0" ] && [ "$CODE" != "200" ] && [ -n "$CODE" ]; then
            echo "::error::hiboard business error code=$CODE"
            cat /tmp/hiboard-resp.json
            exit 1
          fi

          echo "✅ Notification pushed to hiboard (code=$CODE)"
